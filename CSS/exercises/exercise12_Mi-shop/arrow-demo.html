<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>平头箭头按钮示例</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #222;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    .arrow-btn {
      width: 40px;
      height: 40px;
      background: #3b3b3b;      /* 按钮灰色背景 */
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      cursor: pointer;
    }

    .arrow {
      width: 14px;              /* 控制箭头整体大小 */
      height: 14px;
      position: relative;
    }

    .arrow::before,
    .arrow::after {
      content: "";
      position: absolute;
      left: 2px;                /* 控制左右位置 */
      top: 50%;
      width: 10px;              /* 线段长度 */
      height: 2px;              /* 线段粗细 */
      background: #fff;         /* 线段颜色 */
      transform-origin: left center;
    }

    .arrow::before {
      transform: translateY(-50%) rotate(45deg);
      top: 5.5px;
    }

    .arrow::after {
      transform: translateY(-50%) rotate(-45deg);
    }

    .arrow-btn:hover {
      background: #4a4a4a;
    }
  </style>
</head>
<body>
  <div class="arrow-btn">
    <span class="arrow"></span>
  </div>
</body>
</html>
